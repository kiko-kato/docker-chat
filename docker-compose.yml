version: '3.1'
services:
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: chat
    volumes:
      - db_data:/var/lib/mysql

  web:
    image: php:8.2-apache
    restart: always
    ports:
      - 8080:80
    volumes:
      - ./site:/var/www/html
    depends_on:
      - db

volumes:
  db_data: